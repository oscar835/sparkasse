name: Download Sparkasse Excel

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installieren
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Excel herunterladen
        run: python scripts/download_sparkasse.py

      - name: Datei als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: sparkasse-excel
          path: downloads/*
          retention-days: 30

      - name: Datei ins Repo committen
        run: |
          mkdir -p data
          cp downloads/* data/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Keine Aenderungen"
          else
            git commit -m "Daten aktualisiert $(date '+%Y-%m-%d')"
            git push
          fi
